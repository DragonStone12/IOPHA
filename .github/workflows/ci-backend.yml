name: CI - Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'IOPHA-backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'IOPHA-backend/**'
  workflow_dispatch:

jobs:
  bandit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] bandit-sarif-formatter
      - name: Run Bandit Analysis
        run: |
          mkdir -p reports
          bandit -r IOPHA-backend -c IOPHA-backend/pyproject.toml --severity-level medium -f sarif -o reports/bandit-report.sarif
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/bandit-report.sarif
          category: bandit-analysis

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Run pip-audit
        run: |
          mkdir -p reports
          pip-audit -r IOPHA-backend/requirements.txt --fix --desc --format markdown -o reports/pip-audit-report.md
      - name: Upload pip-audit markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: reports/pip-audit-report.md

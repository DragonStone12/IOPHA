name: CI - Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff Linting
        run: ruff check IOPHA-backend/

  ruff-format:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Check Ruff Formatting
        run: ruff format --check IOPHA-backend/

  mypy:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests types-setuptools -r IOPHA-backend/requirements.txt
      - name: Run Mypy Type Checking
        run: mypy IOPHA-backend/

  bandit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    defaults:
      run:
        working-directory: IOPHA-backend
    steps:
        - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] bandit-sarif-formatter
      - name: Run Bandit Analysis
        run: |
          mkdir -p reports
          bandit -r . -c pyproject.toml --severity-level medium -f sarif -o reports/bandit-report.sarif
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: IOPHA-backend/reports/bandit-report.sarif
          category: bandit-analysis

  pip-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOPHA-backend
    steps:
        - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Run pip-audit
        run: |
          mkdir -p reports
          pip-audit -r requirements.txt --fix --desc --format markdown -o reports/pip-audit-report.md
      - name: Upload pip-audit markdown artifact
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: IOPHA-backend/reports/pip-audit-report.md

  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOPHA-backend
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test with pytest
        run: |
          mkdir -p junit reports
          pytest tests --doctest-modules --junitxml=junit/test-results.xml --cov=app --cov-report=xml:reports/coverage.xml --cov-report=html:reports/htmlcov
        working-directory: IOPHA-backend
      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-test-results
          path: IOPHA-backend/junit/test-results.xml
          if-no-files-found: ignore
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: html-coverage-report
          path: IOPHA-backend/reports/htmlcov
          if-no-files-found: ignore

name: Security Audit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] bandit-sarif-formatter
      - name: Run Bandit Analysis
        run: |
          mkdir -p reports
          bandit -r . -c pyproject.toml --severity-level medium -f sarif -o reports/bandit-report.sarif
          bandit -r . -c pyproject.toml --severity-level medium -f html -o reports/bandit-report.html
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif-report
          path: reports/bandit-report.sarif
      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-html-report
          path: reports/bandit-report.html

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Run pip-audit
        run: |
          mkdir -p reports
          pip-audit -r requirements.txt --fix --desc --format markdown -o reports/pip-audit-report.md
      - name: Upload pip-audit markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: reports/pip-audit-report.md

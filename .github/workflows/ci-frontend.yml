name: CI - Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'IOPHA-frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'IOPHA-frontend/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOPHA-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run npm audit
        run: npm audit --audit-level=high

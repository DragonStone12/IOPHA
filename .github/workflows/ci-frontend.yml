name: CI - Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    defaults:
      run:
        working-directory: IOPHA-frontend
    steps:
        - uses: actions/checkout@v7
      - name: Setup Node.js v24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: IOPHA-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run npm audit
        id: audit_step
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - name: Fix npm vulnerabilities
        if: steps.audit_step.outcome == 'failure'
        run: |
          echo "⚠️ Initial audit failed. Attempting fix..."
          npm audit fix --force
          npm audit --omit=dev --audit-level=high
      - name: Generate ESLint SARIF
        if: always()
        run: |
          npx eslint src --ext .ts,.tsx --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif || true
      - name: Upload SARIF results
        if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: IOPHA-frontend/eslint-results.sarif
          category: eslint-security-bug-analysis

  cypress-component:
    name: Cypress Component Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOPHA-frontend
    steps:
        - uses: actions/checkout@v7
      - name: Setup Node.js v24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: IOPHA-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Component Tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: IOPHA-frontend
          command: npx cypress run --component
      - name: Upload Component Screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: component-screenshots
          path: IOPHA-frontend/cypress/screenshots
          if-no-files-found: ignore

  cypress-e2e:
    name: Cypress E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
      fail-fast: false
    defaults:
      run:
        working-directory: IOPHA-frontend
    steps:
        - uses: actions/checkout@v7
      - name: Setup Node.js v24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: IOPHA-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run E2E Tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: IOPHA-frontend
          build: npm run build
          start: npm run dev
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          command: npx cypress run --e2e --browser ${{ matrix.browser }}
      - name: Upload E2E Screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.browser }}
          path: IOPHA-frontend/cypress/screenshots
          if-no-files-found: ignore
      - name: Upload Visual Diffs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: visual-diffs-${{ matrix.browser }}
          path: IOPHA-frontend/cypress-visual-screenshots/diff
          if-no-files-found: ignore

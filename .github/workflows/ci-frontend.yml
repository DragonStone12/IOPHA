name: CI - Frontend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOPHA-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
      - name: Fix npm vulnerabilities
        if: failure()
        run: npm audit fix --force && npm audit --omit=dev --audit-level=high
      - name: Generate ESLint SARIF
        if: always()
        run: |
          npx eslint src --ext .ts,.tsx --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif || true
      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: IOPHA-frontend/eslint-results.sarif
          category: eslint-security-bug-analysis

  cypress-component:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci --prefix IOPHA-frontend
      - name: Cypress Component Tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: IOPHA-frontend
          command: npx cypress run --component
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: component-test-screenshots
          path: IOPHA-frontend/cypress/screenshots
          if-no-files-found: ignore

  cypress-e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci --prefix IOPHA-frontend
      - name: Cypress E2E Tests (includes Cucumber BDD feature tests)
        uses: cypress-io/github-action@v7
        with:
          working-directory: IOPHA-frontend
          build: npm run build
          start: npm run dev
          wait-on: 'http://localhost:3000'
          command: npx cypress run --e2e --browser ${{ matrix.browser }}
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: IOPHA-frontend/cypress/screenshots
          if-no-files-found: ignore
      - name: Upload visual diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs-${{ matrix.browser }}
          path: IOPHA-frontend/cypress-visual-screenshots/diff
          if-no-files-found: ignore
name: CI - Frontend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOPHA-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
      - name: Fix npm vulnerabilities
        if: failure()
        run: npm audit fix --force && npm audit --omit=dev --audit-level=high

  cypress-e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --prefix IOPHA-frontend
      - name: Cypress Run
        uses: cypress-io/github-action@v7
        with:
          working-directory: IOPHA-frontend
          build: npm run build
          start: npm run dev
          wait-on: 'http://localhost:3000'
          command: npx cypress run --e2e --browser ${{ matrix.browser }}
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: IOPHA-frontend/cypress/screenshots
          if-no-files-found: ignore
      - name: Upload visual diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs-${{ matrix.browser }}
          path: IOPHA-frontend/cypress-visual-screenshots/diff
          if-no-files-found: ignore
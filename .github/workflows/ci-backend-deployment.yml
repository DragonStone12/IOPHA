name: IOPHA Backend Deployment

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: iopha-backend
  LAMBDA_FUNCTION_NAME: IOPHA-backend
  BACKEND_DIR: IOPHA-backend
  RELEASE_VERSION: "1.0.0"

jobs:
  release:
    name: Tag & Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release tag
        id: tag
        run: |
          # Single source of truth for sanitization. Strip a leading "release/"
          # prefix (any case), replace slashes, drop illegal chars, and trim all
          # leading/trailing dashes. Falls back to 1.0.0 if empty.
          RAW="${{ env.RELEASE_VERSION }}"
          TAG="$(echo "$RAW" | tr '[:upper:]' '[:lower:]')"
          TAG="${TAG#release/}"
          TAG="${TAG//\//-}"
          TAG="$(echo "$TAG" | tr -cd 'A-Za-z0-9._-')"
          TAG="$(echo "$TAG" | sed -E 's/^-+|-+$//g')"
          TAG="${TAG:-1.0.0}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Release Notes Dependencies
        run: npm install git-log-parser@^1.2.1 through2@^4.0.2

      - name: Generate Release Notes
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.tag }}
        run: node generate-release-notes.js

      - name: Create Git Tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Re-runs must re-tag at the current commit: if the tag already
          # exists on origin (e.g. from a run whose deploy job later failed),
          # delete it remotely and locally before recreating it.
          # Test ls-remote's output rather than --exit-code, which is
          # unreliable with --tags/--refs on some git versions.
          if [ -n "$(git ls-remote --tags origin --refs "refs/tags/$TAG")" ]; then
            echo "Tag $TAG already exists on origin — deleting it before re-tagging."
            git push origin --delete "refs/tags/$TAG"
            git tag -d "$TAG" || true
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Upload Release Notes Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-${{ steps.tag.outputs.tag }}
          path: |
            release-notes-${{ steps.tag.outputs.tag }}.md
          if-no-files-found: warn

  deploy-backend:
    name: Deploy Backend to Lambda
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Secrets (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) are stored in the
    # "AWS" GitHub environment; the job must declare it to receive them.
    environment: AWS
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Configure AWS Credentials
        # v6 is the first major running on Node 24 (v4/v5 both use node20).
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # The '.' means it builds using the Dockerfile in the current (backend) directory
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          echo "IMAGE_URI=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --image-uri ${{ env.IMAGE_URI }}

      - name: Deployment Summary
        run: |
          echo "✅ Backend successfully deployed to Lambda!"
          echo "🔗 API Gateway Endpoint: https://k6bbr9kln1.execute-api.us-east-2.amazonaws.com/prod/iopha"
          echo "🏷️ Release Tag: ${{ needs.release.outputs.release_tag }}"

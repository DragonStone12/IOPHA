name: Generate Release Notes for IOPHA Deployment

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Derive release tag
        id: tag
        run: |
          # Single source of truth for sanitization. Strip a leading "release/"
          # prefix (any case), replace slashes, drop illegal chars, and trim all
          # leading/trailing dashes. Falls back to 1.0.0 if empty.
          RAW="${{ github.ref_name }}"
          TAG="$(echo "$RAW" | tr '[:upper:]' '[:lower:]')"
          TAG="${TAG#release/}"
          TAG="${TAG//\//-}"
          TAG="$(echo "$TAG" | tr -cd 'A-Za-z0-9._-')"
          TAG="$(echo "$TAG" | sed -E 's/^-+|-+$//g')"
          TAG="${TAG:-1.0.0}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Release Notes Dependencies
        run: npm install git-log-parser@^1.2.1 through2@^4.0.2

      - name: Generate Release Notes
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.tag }}
          SINCE_DAYS: 7
        run: node generate-release-notes.js

      - name: Upload Release Notes Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-${{ steps.tag.outputs.tag }}
          path: release-notes-${{ steps.tag.outputs.tag }}.md

      - name: Display Release Notes
        run: cat release-notes-${{ steps.tag.outputs.tag }}.md

[tool.bandit]
exclude_dirs = ["venv", ".git", "__pycache__", "tests"]
skips = ["B101"]

[[tool.bandit.severity]]
level = "LOW"
action = "skip"

[[tool.bandit.severity]]
level = "MEDIUM"
action = "warn"

[[tool.bandit.severity]]
level = "HIGH"
action = "block"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "S", "B", "PLR"]
ignore = ["S105", "S106", "S107"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

# S101 (assert) and PLR2004 (magic value comparisons, e.g. HTTP 200) are
# idiomatic and expected in test code. Per RUFF_MYPY_LINTING.md, S101 is
# bypassed in tests; PLR2004 follows the same rationale for test assertions.
[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "PLR2004"]
# Frontend-aligned contracts use camelCase field names (e.g. reviewCount,
# nextAvailable, imageUrl) dictated by the API schema; they are intentional.
"app/schemas/**" = ["N815"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true

# Tests are not part of the shipped type surface, and CI installs only the
# runtime requirements before running mypy (no pytest). Don't fail on
# third-party test-only imports (e.g. pytest) that aren't installed there.
[[tool.mypy.overrides]]
module = ["tests.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*"]
check_untyped_defs = false
disallow_untyped_defs = false
warn_return_any = false

# python-stdnum ships without type stubs; tolerate its absence in the
# type-check environment (the hook's mypy resolution may not have it
# installed). The import is exercised by the test suite.
[[tool.mypy.overrides]]
module = ["stdnum.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests/unit", "tests/e2e", "tests/integration"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"
pythonpath = ["."]

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
  "pragma: no cover",
  "def __repr__",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]
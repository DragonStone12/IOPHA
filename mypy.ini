# mypy is invoked from the repo root by .husky/pre-push and CI
# (`mypy IOPHA-backend/`). mypy reads config only from the current working
# directory, so this file exists to keep third-party virtualenv console
# scripts (e.g. IOPHA-backend/venv/bin/jp.py, shipped by jmespath) out of
# the type gate. The authoritative strict settings live in
# IOPHA-backend/pyproject.toml and apply when mypy runs from there.
[mypy]
exclude = venv

[mypy-aws_lambda_powertools.*]
ignore_missing_imports = True

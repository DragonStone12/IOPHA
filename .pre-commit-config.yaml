repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, typescript, json, yaml]
        exclude: "^IOPHA-frontend/dist/"

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend eslint
        entry: npm run lint --prefix IOPHA-frontend
        language: system
        pass_filenames: false
        files: ^IOPHA-frontend/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^IOPHA-backend/
      - id: ruff-format
        files: ^IOPHA-backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-setuptools
          - fastapi
          - pydantic
          - starlette
          - prometheus-fastapi-instrumentator
          - pytest
        args: [--config-file=IOPHA-backend/pyproject.toml]
        files: ^IOPHA-backend/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args:
          ["-c", "IOPHA-backend/pyproject.toml", "--severity-level", "medium"]
        files: ^IOPHA-backend/
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.1
    hooks:
      - id: pip-audit
        args: ["-r", "IOPHA-backend/requirements.txt", "--fix", "--desc"]
        ci:
          skip: [pip-audit]
